services:
  litellm-db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks: [qfind-net]

  litellm-redis:
    image: redis:7
    networks: [qfind-net]

  vllm-chat:
    image: vllm/vllm-openai:v0.17.0
    command: >
      --model /models/qwen2.5-3b-awq
      --quantization awq
      --served-model-name qfind-chat
      --gpu-memory-utilization 0.80
      --max-model-len 8192
      --max-num-seqs 8
      --enforce-eager
      --enable-prefix-caching

    volumes:
      - ./model-cache/qwen2.5-3b-awq:/models/qwen2.5-3b-awq:ro
    ports:
      - "8000:8000"
    deploy:
      resources:
        reservations:
          devices:
            - { driver: nvidia, count: all, capabilities: [gpu] }
    networks: [qfind-net]

  tei-embed:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.5
      
    command: ["--model-id", "/models/bge-m3"]

    volumes:
      - ./model-cache/bge-m3:/models/bge-m3:ro
        
    ports: ["8001:80"]

    networks: [qfind-net]

  tei-rerank:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.5

    command: ["--model-id", "/models/bge-reranker-v2-m3"]

    volumes:
      - ./model-cache/bge-reranker-v2-m3:/models/bge-reranker-v2-m3:ro
      
    ports: ["8002:80"]

    networks: [qfind-net]
  
  litellm:
    image: ghcr.io/berriai/litellm:main-v1.40.0  
    command: ["--config", "/app/config.yaml", "--port", "4000", "--detailed_debug"]
    volumes:
      - ./litellm/config.yaml:/app/config.yaml:ro
    ports:
      - "4000:4000"
    env_file: [.env]
    depends_on:
      - litellm-db
      - litellm-redis
    networks: [qfind-net]

  qdrant:
    image: qdrant/qdrant:v1.9.0    # pin a specific version
    volumes:
      - qdrant-data:/qdrant/storage
    ports:
      - "6333:6333"   # HTTP API
      - "6334:6334"   # gRPC (optional, can leave out if not used)
    networks: [qfind-net]

networks:
  qfind-net:

volumes:
  pgdata:
  qdrant-data: