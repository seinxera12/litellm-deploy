# Production Compose — RTX 5090 server
# Usage: docker compose -f docker-compose.prod.yml up -d
# All model-cache paths are absolute so the file is unambiguous when referenced with -f

services:

  # ─── Databases ──────────────────────────────────────────────────────────────

  litellm-db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks: [qfind-net]

  litellm-redis:
    image: redis:7
    restart: unless-stopped
    networks: [qfind-net]

  # ─── Inference engines ──────────────────────────────────────────────────────

  vllm-chat:
    image: vllm/vllm-openai:v0.17.0
    restart: unless-stopped
    environment:
      CUDA_DEVICE_ORDER: PCI_BUS_ID
      CUDA_VISIBLE_DEVICES: "1"
    command: >
      --model /models/qwen2.5-14b-instruct
      --quantization fp8    
      --served-model-name qfind-chat
      --gpu-memory-utilization 0.70
      --max-model-len 16384
      --tensor-parallel-size 1
      --enable-prefix-caching
    volumes:
      - ./model-cache/qwen2.5-14b-instruct:/models/qwen2.5-14b-instruct:ro
    ports:
      - "127.0.0.1:8000:8000"   # bind to loopback only — Caddy/LiteLLM reach it via qfind-net
    deploy:
      resources:
        reservations:
          devices:
            - { driver: nvidia, count: all, capabilities: [gpu] }
    networks: [qfind-net]

  stt-whisper:
    image: ghcr.io/speaches-ai/speaches:latest-cuda-12.6.3   # verify tag per the note above
    restart: unless-stopped
    environment:
      HF_HOME: /home/ubuntu/.cache/huggingface
      CUDA_DEVICE_ORDER: PCI_BUS_ID        # A400 — dedicated, does not compete with vllm-chat on GPU 1
      WHISPER__MODEL: Systran/faster-whisper-large-v3
      WHISPER__INFERENCE_DEVICE: cuda
      WHISPER__COMPUTE_TYPE: float16
      WHISPER__USE_BATCHED_MODE: "true"   # NEW — biggest lever: parallel VAD-chunk decoding instead of one segment at a time. This is what will actually use the 5090.
      STT_MODEL_TTL: "-1"                 # NEW — never unload between jobs; avoids reload latency on the next transcription
      PRELOAD_MODELS: '["Systran/faster-whisper-large-v3"]'   # NEW — model is loaded and warm at container start, not on first request
    volumes:
      - ./model-cache/hub:/home/ubuntu/.cache/huggingface/hub:ro
    ports:
      - "127.0.0.1:8003:8000"          # loopback only, same pattern as vLLM/TEI — LiteLLM reaches it via qfind-net
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["1"]
              capabilities: [gpu]   # tightened from "all" — CUDA_VISIBLE_DEVICES already restricts to GPU 1, so match the reservation to what's actually used
    networks: [qfind-net]

  stt-fastwhisper:
    build: ./stt-fastwhisper
    restart: unless-stopped
    environment:
      HF_HOME: /home/ubuntu/.cache/huggingface   # /home/ubuntu (not /root) — matches stt-whisper; /root caused docker access problems before
      CUDA_DEVICE_ORDER: PCI_BUS_ID       # match stt-whisper; GPU is selected via device_ids below, NOT CUDA_VISIBLE_DEVICES
      FW_MODEL: large-v3                  # resolves to Systran/faster-whisper-large-v3 — same repo/cache as speaches
      FW_DEVICE: cuda
      FW_COMPUTE_TYPE: float16
      FW_BATCH_SIZE: "8"                 # default batch size; overridable per-request via the form body
    volumes:
      - ./model-cache/hub:/home/ubuntu/.cache/huggingface/hub:ro   # reuse the already-downloaded large-v3 cache; same mount path as speaches, :ro
    ports:
      - "127.0.0.1:8004:8000"          # loopback only, same pattern as vLLM/speaches — LiteLLM reaches it via qfind-net
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["1"]         # same single mechanism as stt-whisper — do NOT also set CUDA_VISIBLE_DEVICES
              capabilities: [gpu]
    networks: [qfind-net]

  tei-embed:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.5
    restart: unless-stopped

    # Pin to CCD1 (frequency die, cores 8-15). Embed streams the full weight set
    # each pass and won't fit any cache, so it prefers the higher clock. 8 physical
    # cores only — SMT siblings (24-31) hurt dense GEMM.
    cpuset: "8-15"
    environment:
      OMP_NUM_THREADS: "8"
      RAYON_NUM_THREADS: "8"

    command: ["--model-id", "/models/bge-m3",
              "--auto-truncate", "--max-batch-tokens", "8192",
              "--max-client-batch-size", "64", "--tokenization-workers", "4",
              "--max-concurrent-requests", "64"]

    volumes:
      - ./model-cache/bge-m3:/models/bge-m3:ro
      # NOTE: still fp32 ONNX. int8 (Change 2) is a follow-up — generate with
      # optimum-cli, then overlay ./model-cache/bge-m3/onnx-int8/model.onnx here.

    ports: ["127.0.0.1:8001:80"]

    networks: [qfind-net]

  tei-rerank:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.5
    restart: unless-stopped

    # Pin to CCD0 (3D V-cache die, cores 0-7). The cross-encoder is memory-bound and
    # benefits most from the 96 MB L3. Verify CCD0 is the V-cache die with `lscpu -C`
    # (larger L3); if it's CCD1, swap this cpuset with tei-embed's.
    cpuset: "0-7"
    environment:
      OMP_NUM_THREADS: "8"
      RAYON_NUM_THREADS: "8"

    command: ["--model-id", "/models/bge-reranker-v2-m3",
              "--auto-truncate", "--max-batch-tokens", "8192",
              "--max-client-batch-size", "64", "--tokenization-workers", "4",
              "--max-concurrent-requests", "64"]

    volumes:
      - ./model-cache/bge-reranker-v2-m3-onnx:/models/bge-reranker-v2-m3:ro
      # Change 1: overlay the already-downloaded int8 weights onto model.onnx.
      # int8 is self-contained (no _data file); TEI's ORT backend always loads the
      # file literally named onnx/model.onnx. Original files on disk are untouched.
      - ./model-cache/bge-reranker-v2-m3-onnx/onnx/model_int8.onnx:/models/bge-reranker-v2-m3/onnx/model.onnx:ro

    ports: ["127.0.0.1:8002:80"]

    networks: [qfind-net]

  # ─── Gateway ────────────────────────────────────────────────────────────────

  litellm:
    image: ghcr.io/berriai/litellm:latest
    restart: unless-stopped
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    volumes:
      - ./litellm/config.yaml:/app/config.yaml:ro
    ports:
      - "127.0.0.1:4000:4000"   # loopback only — Caddy proxies externally
    env_file: [.env]
    depends_on: 
      - litellm-db
      - litellm-redis
    networks: [qfind-net] 

# ─── Vector store ───────────────────────────────────────────────────────────

  qdrant:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    volumes:
      - qdrant-data:/qdrant/storage
    ports:
      - "127.0.0.1:6333:6333"
      - "127.0.0.1:6334:6334"
    networks: [qfind-net]

# ─── Monitoring ─────────────────────────────────────────────────────────────

  prometheus:
    image: prom/prometheus:v2.53.0
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "127.0.0.1:9090:9090"   # loopback only — access via SSH tunnel
    networks: [qfind-net]

  dcgm-exporter:
    image: nvcr.io/nvidia/k8s/dcgm-exporter:3.3.5-3.4.0-ubuntu22.04
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - { driver: nvidia, count: all, capabilities: [gpu] }
    ports:
      - "127.0.0.1:9400:9400"
    networks: [qfind-net]

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    restart: unless-stopped
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
      - /sys/fs/cgroup:/sys/fs/cgroup:ro
    ports:
      - "127.0.0.1:8080:8080"
    networks: [qfind-net]

  loki:
    image: grafana/loki:3.0.0
    restart: unless-stopped
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ./monitoring/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki-data:/loki
    ports:
      - "127.0.0.1:3100:3100"
    networks: [qfind-net]

  promtail:
    image: grafana/promtail:3.0.0
    restart: unless-stopped
    volumes:
      - ./monitoring/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/promtail-config.yml
    networks: [qfind-net]

  grafana:
    image: grafana/grafana:11.1.0
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "127.0.0.1:3000:3000"   # loopback only — access via SSH tunnel
    networks: [qfind-net]

  # ─── Reverse proxy (HTTPS) ──────────────────────────────────────────────────

  caddy:
    image: caddy:2.9.1-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    networks: [qfind-net]

networks:
  qfind-net:

volumes:
  pgdata:
  qdrant-data:
  caddy-data:     # persists TLS certs — never delete this volume
  caddy-config:
  prometheus-data:
  loki-data:
  grafana-data:
