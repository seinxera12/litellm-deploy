# Production Compose — RTX 5090 server
# Usage: docker compose -f docker-compose.prod.yml up -d
# All model-cache paths are absolute so the file is unambiguous when referenced with -f

services:

  # ─── Databases ──────────────────────────────────────────────────────────────

  litellm-db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks: [qfind-net]

  litellm-redis:
    image: redis:7
    restart: unless-stopped
    networks: [qfind-net]

  # ─── Inference engines ──────────────────────────────────────────────────────

  vllm-chat:
    image: vllm/vllm-openai:v0.17.0
    restart: unless-stopped
    environment:
      CUDA_DEVICE_ORDER: PCI_BUS_ID
      CUDA_VISIBLE_DEVICE: "1"
    command: >
      --model /models/qwen2.5-14b-instruct
      --quantization fp8
# ─── Monitoring ─────────────────────────────────────────────────────────────

  prometheus:
    image: prom/prometheus:v2.53.0
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "127.0.0.1:9090:9090"   # loopback only — access via SSH tunnel
    networks: [qfind-net]

  dcgm-exporter:
    image: nvcr.io/nvidia/k8s/dcgm-exporter:3.3.5-3.4.0-ubuntu22.04
    restart: unless-stopped
    cap_add:
      - SYS_ADMIN
    deploy:
      resources:
        reservations:
          devices:
            - { driver: nvidia, count: all, capabilities: [gpu] }
    ports:
      - "127.0.0.1:9400:9400"
    networks: [qfind-net]

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    restart: unless-stopped
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    ports:
      - "127.0.0.1:8080:8080"
    networks: [qfind-net]

  loki:
    image: grafana/loki:3.0.0
    restart: unless-stopped
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ./monitoring/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki-data:/loki
    ports:
      - "127.0.0.1:3100:3100"
    networks: [qfind-net]

  promtail:
    image: grafana/promtail:3.0.0
    restart: unless-stopped
    volumes:
      - ./monitoring/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/promtail-config.yml
    networks: [qfind-net]

  grafana:
    image: grafana/grafana:11.1.0
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "127.0.0.1:3000:3000"   # loopback only — access via SSH tunnel
    networks: [qfind-net]      --served-model-name qfind-chat
      --gpu-memory-utilization 0.70
      --max-model-len 16384
      --tensor-parallel-size 1
      --enable-prefix-caching
    volumes:
      - ./model-cache/qwen2.5-14b-instruct:/models/qwen2.5-14b-instruct:ro
    ports:
      - "127.0.0.1:8000:8000"   # bind to loopback only — Caddy/LiteLLM reach it via qfind-net
    deploy:
      resources:
        reservations:
          devices:
            - { driver: nvidia, count: all, capabilities: [gpu] }
    networks: [qfind-net]

  tei-embed:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.5
      
    command: ["--model-id", "/models/bge-m3"]

    volumes:
      - ./model-cache/bge-m3:/models/bge-m3:ro
        
    ports: ["127.0.0.1:8001:80"]

    networks: [qfind-net]

  tei-rerank:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.5

    command: ["--model-id", "/models/bge-reranker-v2-m3"]

    volumes:
      - ./model-cache/bge-reranker-v2-m3-onnx:/models/bge-reranker-v2-m3:ro
      
    ports: ["127.0.0.1:8002:80"]

    networks: [qfind-net]

  # ─── Gateway ────────────────────────────────────────────────────────────────

  litellm:
    image: ghcr.io/berriai/litellm:latest
    restart: unless-stopped
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    volumes:
      - ./litellm/config.yaml:/app/config.yaml:ro
    ports:
      - "127.0.0.1:4000:4000"   # loopback only — Caddy proxies externally
    env_file: [.env]
    depends_on: 
      - litellm-db
      - litellm-redis
    networks: [qfind-net] 

# ─── Vector store ───────────────────────────────────────────────────────────

  qdrant:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    volumes:
      - qdrant-data:/qdrant/storage
    ports:
      - "127.0.0.1:6333:6333"
      - "127.0.0.1:6334:6334"
    networks: [qfind-net]

# ─── Monitoring ─────────────────────────────────────────────────────────────

  prometheus:
    image: prom/prometheus:v2.53.0
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "127.0.0.1:9090:9090"   # loopback only — access via SSH tunnel
    networks: [qfind-net]

  dcgm-exporter:
    image: nvcr.io/nvidia/k8s/dcgm-exporter:3.3.5-3.4.0-ubuntu22.04
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - { driver: nvidia, count: all, capabilities: [gpu] }
    ports:
      - "127.0.0.1:9400:9400"
    networks: [qfind-net]

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    restart: unless-stopped
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
      - /sys/fs/csgroup:/sys/fs/cgroup:ro
    ports:
      - "127.0.0.1:8080:8080"
    networks: [qfind-net]

  loki:
    image: grafana/loki:3.0.0
    restart: unless-stopped
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ./monitoring/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki-data:/loki
    ports:
      - "127.0.0.1:3100:3100"
    networks: [qfind-net]

  promtail:
    image: grafana/promtail:3.0.0
    restart: unless-stopped
    volumes:
      - ./monitoring/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/promtail-config.yml
    networks: [qfind-net]

  grafana:
    image: grafana/grafana:11.1.0
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "127.0.0.1:3000:3000"   # loopback only — access via SSH tunnel
    networks: [qfind-net]

  # ─── Reverse proxy (HTTPS) ──────────────────────────────────────────────────

  caddy:
    image: caddy:2.9.1-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    networks: [qfind-net]

networks:
  qfind-net:

volumes:
  pgdata:
  qdrant-data:
  caddy-data:     # persists TLS certs — never delete this volume
  caddy-config:
  prometheus-data:
  loki-data:
  grafana-data:
