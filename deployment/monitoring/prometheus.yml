global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:

  - job_name: vllm
    static_configs:
      - targets: ['vllm-chat:8000']
    metrics_path: /metrics

  - job_name: litellm
    static_configs:
      - targets: ['litellm:4000']
    metrics_path: /metrics

  - job_name: dcgm
    static_configs:
      - targets: ['dcgm-exporter:9400']

  - job_name: cadvisor
    static_configs:
      - targets: ['cadvisor:8080']

  - job_name: tei-embed
    static_configs:
      - targets: ['tei-embed:80']
    metrics_path: /metrics

  - job_name: tei-rerank
    static_configs:
      - targets: ['tei-rerank:80']
    metrics_path: /metrics

  - job_name: qdrant
    static_configs:
      - targets: ['qdrant:633']
    metrics_path: /metrics

