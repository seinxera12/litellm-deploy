model_list:
  # qfind-chat failover group — all three chat backends serve --served-model-name qfind-chat.
  # Only one runs at a time (VRAM); background health checks (see general_settings) exclude the
  # stopped backends, so the app keeps calling `qfind-chat` and reaches whichever is up.
  # Swap models = docker compose up/down of the profile services; no client or config change.
  - model_name: qfind-chat
    litellm_params:
      model: openai/qfind-chat
      api_base: http://vllm-chat:8000/v1          # 7B fp8 (default, always-on)
      api_key: "none"
  - model_name: qfind-chat
    litellm_params:
      model: openai/qfind-chat
      api_base: http://vllm-chat-14b:8000/v1       # 14B fp8 + fp8 KV (profile chat-14b)
      api_key: "none"
  - model_name: qfind-chat
    litellm_params:
      model: openai/qfind-chat
      api_base: http://vllm-chat-awq:8000/v1       # 14B AWQ + fp8 KV (profile chat-awq)
      api_key: "none"

  - model_name: qfind-embed
    litellm_params:
      model: openai/qfind-embed
      api_base: http://vllm-embed:8000/v1
      api_key: "none"

  - model_name: qfind-rerank
    litellm_params:
      model: hosted_vllm/qfind-rerank
      api_base: http://vllm-rerank:8000
      api_key: "none"

  - model_name: qfind-stt
    litellm_params:
      model: openai/Systran/faster-whisper-large-v3
      api_base: http://stt-fastwhisper:8000/v1   # was http://stt-whisper:8000/v1 (speaches) — now the dedicated faster-whisper service
      api_key: "none"

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/DATABASE_URL
  store_model_in_db: true
  # Probe each qfind-chat deployment periodically so stopped backends are marked unhealthy
  # and excluded from routing — avoids per-request connection errors to the dormant variants.
  background_health_checks: true
  health_check_interval: 300
