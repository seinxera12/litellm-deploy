model_list:
  # Single upstream = the Docker network alias `qfind-chat-upstream`, which all three chat
  # services share. Only one runs at a time (VRAM), so the alias resolves to whichever
  # container is up. No dead deployments in the router → no per-request failover errors.
  # Swap models = docker compose up/down of the profile services; no client or config change.
  - model_name: qfind-chat
    litellm_params:
      model: openai/qfind-chat
      api_base: http://qfind-chat-upstream:8000/v1
      api_key: "none"

  - model_name: qfind-embed
    litellm_params:
      model: openai/qfind-embed
      api_base: http://vllm-embed:8000/v1
      api_key: "none"

  - model_name: qfind-rerank
    litellm_params:
      model: hosted_vllm/qfind-rerank
      api_base: http://vllm-rerank:8000
      api_key: "none"

  - model_name: qfind-stt
    litellm_params:
      model: openai/Systran/faster-whisper-large-v3
      api_base: http://stt-fastwhisper:8000/v1   # was http://stt-whisper:8000/v1 (speaches) — now the dedicated faster-whisper service
      api_key: "none"

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/DATABASE_URL
  store_model_in_db: true
