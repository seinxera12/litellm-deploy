model_list:
  - model_name: qfind-chat
    litellm_params:
      model: openai/qfind-chat       # the stable served name vLLM uses
      api_base: http://vllm-chat:8000/v1
      api_key: "none"                # self-hosted, no upstream key

  # Profile-gated 14B A/B variants (docker-compose profiles chat-14b / chat-awq).
  # Inert unless their backend is running — only one chat model fits in VRAM at a time.
  - model_name: qfind-chat-14b
    litellm_params:
      model: openai/qfind-chat-14b
      api_base: http://vllm-chat-14b:8000/v1
      api_key: "none"

  - model_name: qfind-chat-awq
    litellm_params:
      model: openai/qfind-chat-awq
      api_base: http://vllm-chat-awq:8000/v1
      api_key: "none"

  - model_name: qfind-embed
    litellm_params:
      model: openai/qfind-embed
      api_base: http://vllm-embed:8000/v1
      api_key: "none"

  - model_name: qfind-rerank
    litellm_params:
      model: hosted_vllm/qfind-rerank
      api_base: http://vllm-rerank:8000
      api_key: "none"

  - model_name: qfind-stt
    litellm_params:
      model: openai/Systran/faster-whisper-large-v3
      api_base: http://stt-fastwhisper:8000/v1   # was http://stt-whisper:8000/v1 (speaches) — now the dedicated faster-whisper service
      api_key: "none"

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/DATABASE_URL
  store_model_in_db: true
